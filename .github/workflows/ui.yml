name: UI

on:
  push:
    branches: [main]
    paths: [ui/**]
  pull_request:
    branches: [main]
    paths: [ui/**]

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun lint

      - name: Build
        run: bun build
        env:
          VITE_API_URL: http://localhost:8080
